<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - FEU Roosevelt Events</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="signinup.css" />
  </head>
  <body>
    <div class="auth-container">
      <h2>Register Account</h2>
      <form id="signup-form">
        <div class="form-group">
          <input type="text" id="fname" placeholder="First Name" required />
        </div>
        <div class="form-group">
          <input type="text" id="lname" placeholder="Last Name" required />
        </div>
        <div class="form-group">
          <input
            type="email"
            id="email"
            placeholder="School Email (@feuroosevelt.edu.ph)"
            required
          />
        </div>
        <div class="form-group">
          <input type="text" id="phone" placeholder="Phone Number" required />
        </div>
        <div class="form-group">
          <input
            type="password"
            id="password"
            placeholder="Password"
            required
          />
        </div>
        <div class="form-group">
          <input
            type="password"
            id="confirm-password"
            placeholder="Confirm Password"
            required
          />
        </div>
        <div class="form-options">
          <input type="checkbox" id="show-password-signup" />
          <label for="show-password-signup">Show Passwords</label>
        </div>
        <div class="form-options">
          <button
            type="button"
            id="open-tc"
            style="
              width: 100%;
              padding: 10px;
              background: #e0e0e0;
              border: none;
              border-radius: 4px;
              cursor: pointer;
              font-weight: bold;
              color: #333;
            "
          >
            Read Terms & Conditions
          </button>
        </div>
        <div class="form-options">
          <input type="checkbox" id="tc-checkbox" disabled required />
          <label for="tc-checkbox">I accept the Terms & Conditions</label>
        </div>
        <button type="submit" id="register-btn" class="btn" disabled>
          Sign Up
        </button>
      </form>
      <div class="switch-link">
        Already have an account? <a href="signin.html">Log In</a>
      </div>
    </div>

    <div id="tc-modal" class="modal">
      <div class="modal-content">
        <h3 style="color: #006633">Terms & Conditions</h3>
        <div id="tc-box" class="tc-box">
          <p>Welcome to the FEU Roosevelt Event Management System.</p>
          <p>
            Please read these terms carefully. You must use your official school
            email to register.
          </p>
          <br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br />
          <p>End of Terms and Conditions. You may now acknowledge.</p>
        </div>
        <button type="button" id="acknowledge-btn" class="btn" disabled>
          Acknowledge
        </button>
      </div>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
