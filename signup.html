<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - FEU Roosevelt Events</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="signinup.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div style="text-align: center; margin-bottom: 20px;">
            <a href="index.html">
                <img src="images/feurlogo.png" alt="FEUR Logo" style="width: 60px; height: 60px; border-radius: 50%; background: #fff; border: 2px solid var(--secondary);">
            </a>
        </div>

        <h2>Register Account</h2>
        <form id="signup-form">
            <div class="form-group">
                <input type="text" id="fname" placeholder="First Name" required>
            </div>
            <div class="form-group">
                <input type="text" id="lname" placeholder="Last Name" required>
            </div>
            <div class="form-group">
                <input type="email" id="email" placeholder="School Email (@feuroosevelt.edu.ph)" required>
            </div>
            <div class="form-group">
                <input type="text" id="phone" placeholder="Phone Number" required>
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>
            <div class="form-group">
                <input type="password" id="confirm-password" placeholder="Confirm Password" required>
            </div>
            <div class="form-options">
                <input type="checkbox" id="show-password-signup">
                <label for="show-password-signup">Show Passwords</label>
            </div>
            
            <button type="button" id="open-tc" class="btn" style="background:#e0e0e0; color:#333; margin-bottom: 15px;">Read Terms & Conditions</button>
            
            <div class="form-options">
                <input type="checkbox" id="tc-checkbox" disabled required>
                <label for="tc-checkbox">I accept the Terms & Conditions</label>
            </div>
            
            <button type="submit" id="register-btn" class="btn btn-solid" style="width: 100%; color: white; background: var(--primary);" disabled>Sign Up</button>
        </form>
        <div class="switch-link">
            Already have an account? <a href="signin.html">Log In</a>
        </div>
    </div>

    <div id="tc-modal" class="modal-overlay hidden">
        <div class="modal-box" style="text-align: left;">
            <h3 style="color:var(--primary); margin-bottom: 10px;">Terms & Conditions</h3>
            <div id="tc-box" class="tc-box">
                <p>Welcome to the FEU Roosevelt Event Management System.</p>
                <p>Please read these terms carefully. You must use your official school email to register.</p>
                <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>
                <p>End of Terms and Conditions. You may now acknowledge.</p>
            </div>
            <button type="button" id="acknowledge-btn" class="btn btn-solid" style="width: 100%;" disabled>Acknowledge</button>
        </div>
    </div>

    <div id="custom-alert" class="modal-overlay hidden">
        <div class="modal-box alert-box" style="text-align: center;">
            <h3 id="alert-title">System</h3>
            <p id="alert-message" style="margin: 15px 0; color: #333;"></p>
            <button id="close-alert" class="btn btn-solid" style="width: 100%;">OK</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
