<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - FEU Events</title>
    <link rel="stylesheet" href="signinup.css">
</head>
<body>
    <div class="auth-container">
        <form id="signup-form" class="auth-box">
            <h2>Register</h2>
            <p class="subtitle">Use your official @feuroosevelt.edu.ph email.</p>
            
            <div class="input-group">
                <input type="text" id="fname" placeholder="First Name" required>
                <input type="text" id="lname" placeholder="Last Name" required>
            </div>
            <div class="input-group">
                <input type="email" id="signup-email" placeholder="School Email" required>
                <input type="tel" id="phone" placeholder="Phone Number" required>
            </div>
            <div class="input-group">
                <input type="password" id="signup-password" placeholder="Password" required>
                <input type="password" id="confirm-password" placeholder="Confirm Password" required>
            </div>
            
            <label class="show-pass-label"><input type="checkbox" id="show-signup-pass"> Show Passwords</label>

            <div class="tc-section">
                <button type="button" id="open-tc" class="btn-secondary">Read Terms & Conditions</button>
                <label class="tc-check-label">
                    <input type="checkbox" id="tc-checkbox" disabled> I accept the Terms & Conditions
                </label>
            </div>

            <button type="submit" id="register-btn" class="btn-primary" disabled>Sign Up</button>
            <p>Already have an account? <a href="signin.html">Log In</a></p>
        </form>
    </div>

    <div id="tc-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Terms and Conditions</h3>
            <div id="tc-text" class="scroll-box">
                <p>Welcome to FEU Roosevelt Event Management System...</p>
                <br><br><br><br><br><br><br><br><br><br>
                <p>Scroll down to the bottom to acknowledge.</p>
                <br><br><br><br><br><br><br><br><br><br>
                <p>End of terms.</p>
            </div>
            <button type="button" id="acknowledge-btn" class="btn-primary" disabled>Acknowledge</button>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
