<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up - FEU Roosevelt Events</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="signinup.css" />
  </head>
  <body>
    <div class="auth-container">
      <h2>Register Account</h2>
      <form id="signup-form">
        <div class="form-group">
          <label>First Name</label>
          <input type="text" id="fname" required />
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" id="lname" required />
        </div>
        <div class="form-group">
          <label>Phone Number</label>
          <input type="text" id="phone" required />
        </div>
        <div class="form-group">
          <label>School Email Address</label>
          <input
            type="email"
            id="email"
            placeholder="@feuroosevelt.edu.ph"
            required
          />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" required />
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="confirm-password" required />
        </div>
        <div class="form-options">
          <input type="checkbox" id="show-password-signup" />
          <label for="show-password-signup">Show Password</label>
        </div>
        <div class="form-options">
          <button
            type="button"
            id="open-tc"
            style="
              background: none;
              border: none;
              color: #006633;
              text-decoration: underline;
              cursor: pointer;
              padding: 0;
              font-weight: bold;
            "
          >
            View Terms & Conditions
          </button>
        </div>
        <div class="form-options">
          <input type="checkbox" id="tc-checkbox" disabled required />
          <label for="tc-checkbox">I acknowledge the Terms & Conditions</label>
        </div>
        <button type="submit" id="register-btn" class="btn" disabled>
          Sign Up
        </button>
      </form>
      <div class="switch-link">
        Already have an account? <a href="signin.html">Log In</a>
      </div>
    </div>

    <div id="tc-modal" class="modal">
      <div class="modal-content">
        <h3 style="color: #006633">Terms & Conditions</h3>
        <div id="tc-box" class="tc-box">
          <p>Welcome to the FEU Roosevelt Event Management System.</p>
          <p>
            Please read these terms carefully. You must use your official school
            email to register.
          </p>
          <br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br />
          <p>End of Terms and Conditions. You may now acknowledge.</p>
        </div>
        <button type="button" id="acknowledge-btn" class="btn" disabled>
          Acknowledge
        </button>
      </div>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
