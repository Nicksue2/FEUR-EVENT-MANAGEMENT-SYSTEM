<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel - FEUR Events</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="admin-style.css" />
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  </head>
  <body class="admin-body">
    <header class="top-nav">
      <div class="nav-left">
        <button id="burger-btn" class="icon-btn">☰</button>
        <div class="logo-container">
          <a href="index.html" class="logo-link">
            <img src="images/feurlogo.png" alt="FEUR Logo" class="logo-img" />
            <h2 class="logo-text">Admin Panel</h2>
          </a>
        </div>
      </div>
      <div class="nav-right">
        <div id="user-greeting" class="user-greeting">Admin Mode</div>
      </div>
    </header>

    <div class="layout-container">
      <aside id="sidebar" class="sidebar">
        <nav class="side-menu">
          <a href="index.html">🏠 <span>Dashboard</span></a>
          <a href="admin.html" class="active">🛡️ <span>Manage Events</span></a>
          <a href="orderlist.html">📋 <span>Order List</span></a>
          <a href="#" id="logout-btn" class="nav-logout">🚪 <span>Logout</span></a>
        </nav>
      </aside>

      <main class="admin-main">
        <div class="admin-header">
          <h2>Event Management</h2>
          <button id="cancel-edit" class="btn btn-outline hidden">
            Create New Event
          </button>
        </div>

        <div class="stats-container">
          <div class="stat-box">
            <h3 id="stat-events">0</h3>
            <p>Total Events</p>
          </div>
          <div class="stat-box">
            <h3 id="stat-orders">0</h3>
            <p>Total Orders</p>
          </div>
        </div>
        
        
        <section class="admin-card qr-section">
          <div class="admin-header">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><rect x="7" y="7" width="10" height="10" rx="1"/></svg>
            <h3>QR Ticket Scanner</h3>
          </div>
          <div class="qr-container">
            <div id="reader" class="qr-reader"></div>
            <div id="scanner-result" class="qr-result">Ready to scan.</div>
          </div>
        </section>

        <div class="admin-card">
          <h3 id="form-title" class="form-title-spacing">Add New Event</h3>
          <form id="event-form" class="event-form">
            <input type="hidden" id="event-id" />

            <div class="form-control">
              <label>Event Title</label>
              <input type="text" id="title" required />
            </div>

            <div class="form-control">
              <label>Campus</label>
              <select id="campus">
                <option value="Cainta">Cainta</option>
                <option value="Marikina">Marikina</option>
                <option value="Rodriguez">Rodriguez</option>
              </select>
            </div>

            <div class="form-control">
              <label>Date</label>
              <input type="date" id="date" required />
            </div>

            <div class="form-control">
              <label>Time</label>
              <input type="time" id="time" required />
            </div>

            <div class="form-control">
              <label>Price (0 for Free)</label>
              <input type="number" id="price" value="0" />
            </div>

            <div class="form-control">
              <label>Poster URL</label>
              <input type="text" id="poster_url" placeholder="images/sample.jpg" />
            </div>

            <div class="form-control full-width">
              <label>Description</label>
              <textarea id="desc" rows="3"></textarea>
            </div>

            <button type="submit" id="save-btn" class="btn btn-solid full-width">
              Save Event
            </button>
          </form>
        </div>

        <div class="admin-card">
          <h3>Event List</h3>
          <div class="table-wrapper">
            <table class="admin-table">
              <thead>
                <tr>
                  <th>Event</th>
                  <th>Campus</th>
                  <th>Date</th>
                  <th>Price</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="admin-event-list"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>

    <div id="custom-alert" class="modal-overlay hidden">
      <div class="modal-box alert-box">
        <h3 id="alert-title">System</h3>
        <p id="alert-message"></p>
        <button id="close-alert" class="btn btn-solid alert-btn">
          OK
        </button>
      </div>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
