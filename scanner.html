<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Entry Scanner - FEUR Events</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="admin-style.css" />
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  </head>
  <body class="admin-body">
    <header class="top-nav">
      <div class="nav-left">
        <button id="burger-btn" class="icon-btn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18" /></svg>
        </button>
      </div>

      <div class="logo-container">
        <a href="index.html" class="logo-link">
          <img src="images/feurlogo.png" alt="FEUR Logo" class="logo-img" />
          <h2 class="logo-text">Live Scanner</h2>
        </a>
      </div>

      <div class="nav-right">
        <div id="user-greeting" class="user-greeting">Admin Mode</div>
      </div>
    </header>

    <div class="layout-container">
      <aside id="sidebar" class="sidebar">
        <nav class="side-menu">
          <a href="index.html">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" /><polyline points="9 22 9 12 15 12 15 22" /></svg>
            <span>Dashboard</span>
          </a>
          <a href="admin.html">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            <span>Manage Events</span>
          </a>
          <a href="scanner.html" class="active">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><rect x="7" y="7" width="10" height="10" rx="1"/></svg>
            <span>Entry Scanner</span>
          </a>
          <a href="orderlist.html">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            <span>Order List</span>
          </a>
          <a href="#" id="logout-btn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" /><polyline points="16 17 21 12 16 7" /><line x1="21" y1="12" x2="9" y2="12" /></svg>
            <span>Logout</span>
          </a>
        </nav>
      </aside>

      <main class="main-content">
        <div class="admin-header">
          <h2>Event Admission Gate</h2>
          <p>Scan user tickets here for official event check-in.</p>
        </div>

        <section class="admin-card qr-section">
          <div class="qr-container">
            <div id="entry-reader" class="qr-reader"></div>
            <div id="entry-result" class="qr-result">
              Waiting for ticket...
            </div>
          </div>
        </section>
      </main>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
