<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - FEUR Events</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="signinup.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <a href="index.html"><img src="images/feurlogo.png" alt="FEUR Logo"></a>
        <h2>Create New Password</h2>
        <form id="reset-password-form">
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="new-password" placeholder="Enter new password" required>
            </div>
            <div class="form-options">
                <input type="checkbox" id="show-new-password">
                <label for="show-new-password">Show Password</label>
            </div>
            <button type="submit" id="update-pwd-btn" class="btn-auth">Update Password</button>
        </form>
    </div>

    <div id="custom-alert" class="modal-overlay hidden">
        <div class="modal-box alert-box" style="text-align: center;">
            <div style="font-size: 40px; margin-bottom: 10px;">⚠️</div>
            <h3 id="alert-title">System</h3>
            <p id="alert-message" style="margin: 15px 0; color: #333;"></p>
            <button id="close-alert" class="btn-auth">OK</button>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
