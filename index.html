<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FEU Events</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{colors:{'f-grn':'#3B5E3C','f-bg':'#EAE5D9'}}}}</script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-f-bg font-sans h-screen flex flex-col">
    <header class="bg-f-grn p-4 flex justify-between items-center text-white shadow">
        <span class="font-bold text-xl">FEU Events</span>
        <button onclick="window.location.href='signin.html'" class="bg-white text-f-grn font-bold px-4 py-2 rounded">Login</button>
    </header>
    <main class="p-8">
        <h2 class="text-2xl font-bold mb-6">Upcoming Events</h2>
        <div class="bg-gradient-to-b from-green-700 to-black rounded-3xl h-64 p-5 text-white flex flex-col justify-between max-w-sm">
            <div>
                <h4 class="font-bold text-2xl uppercase">Sinag Tamaraw</h4>
                <p class="text-sm text-gray-300 mt-1">Jan 27, 2026</p>
            </div>
            <button onclick="window.location.href='signin.html'" class="bg-white text-f-grn font-bold py-2 rounded w-full">Login to Register</button>
        </div>
    </main>
</body>
</html>
