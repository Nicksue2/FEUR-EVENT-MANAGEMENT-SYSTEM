<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FEU Events - Public</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              "feu-green": "#3B5E3C",
              "feu-bg": "#EAE5D9",
              "feu-brown": "#8B7A6A",
            },
          },
        },
      };
    </script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="style.css" />
    <script src="script.js" defer></script>
  </head>
  <body class="bg-feu-bg font-sans h-screen flex flex-col overflow-hidden">
    <header
      class="bg-feu-green p-4 flex justify-between items-center z-30 text-white shadow-md"
    >
      <div class="flex items-center space-x-3">
        <span class="font-bold text-xl">FEU Events</span>
      </div>
      <div class="flex space-x-4">
        <button
          onclick="window.location.href = 'signin.html'"
          class="bg-white text-feu-green font-bold px-4 py-2 rounded hover:bg-gray-200 transition"
        >
          Login
        </button>
      </div>
    </header>

    <main class="flex-1 overflow-y-auto p-4 md:p-8">
      <h2 class="text-2xl font-bold text-gray-800 mb-6">Upcoming Events</h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div
          class="bg-gradient-to-b from-green-700 to-black rounded-3xl h-64 relative overflow-hidden flex flex-col justify-between p-5 text-white shadow-md"
        >
          <div>
            <h4 class="font-bold text-2xl uppercase">Sinag Tamaraw</h4>
            <p class="text-sm text-gray-300 mt-1">Jan 27, 2026</p>
          </div>
          <button
            onclick="guestRegisterAlert()"
            class="bg-white text-feu-green font-bold py-2 rounded-lg hover:bg-gray-200 mt-4"
          >
            View & Register
          </button>
        </div>
      </div>
    </main>
  </body>
</html>
