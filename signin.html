<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Log In - FEUR Events</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="signinup.css" />
  </head>
  <body class="auth-page">
    <div class="auth-container">
      <a href="index.html">
        <img src="images/feurlogo.png" alt="FEUR Logo" />
      </a>
      <h2>Log In</h2>
      <form id="signin-form">
        <div class="form-group">
          <label>Email Address</label>
          <input
            type="email"
            id="email"
            placeholder="Enter your email"
            required
          />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input
            type="password"
            id="password"
            placeholder="Enter your password"
            required
          />
        </div>
        <div
          class="form-options"
          style="justify-content: space-between; display: flex; width: 100%"
        >
          <div>
            <input type="checkbox" id="remember-me" />
            <label for="remember-me">Remember Me</label>
          </div>
          <div>
            <input type="checkbox" id="show-password-signin" />
            <label for="show-password-signin">Show Password</label>
          </div>
        </div>
        <div style="text-align: right; margin-bottom: 15px; font-size: 13px">
          <a
            href="#"
            id="forgot-password-link"
            style="color: #006633; text-decoration: none; font-weight: bold"
            >Forgot Password?</a
          >
        </div>
        <button type="submit" id="login-btn" class="btn-auth">Log In</button>
      </form>
      <div class="switch-link">
        Don't have an account? <a href="signup.html">Sign Up</a>
      </div>
    </div>

    <div id="custom-alert" class="modal-overlay hidden">
      <div class="modal-box alert-box" style="text-align: center">
        <div style="font-size: 40px; margin-bottom: 10px">⚠️</div>
        <h3 id="alert-title">System</h3>
        <p id="alert-message" style="margin: 15px 0; color: #333"></p>
        <button id="close-alert" class="btn-auth">OK</button>
      </div>
    </div>

    <script type="module" src="script.js"></script>
  </body>
</html>
