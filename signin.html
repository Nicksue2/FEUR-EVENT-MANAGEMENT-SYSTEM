<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - FEU Events</title>
    <link rel="stylesheet" href="signinup.css">
</head>
<body>
    <div class="auth-container">
        <form id="signin-form" class="auth-box">
            <h2>Log In</h2>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="login-email" required placeholder="name@feuroosevelt.edu.ph">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="login-password" required>
            </div>
            <div class="options">
                <label><input type="checkbox" id="show-login-pass"> Show Password</label>
                <label><input type="checkbox" id="remember-me"> Remember Me</label>
            </div>
            <button type="submit" class="btn-primary">Sign In</button>
            <p>No account yet? <a href="signup.html">Sign Up</a></p>
        </form>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
