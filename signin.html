<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In - FEU Roosevelt Events</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="signinup.css">
</head>
<body class="auth-page">
    <div class="auth-container">
        <div style="text-align: center; margin-bottom: 20px;">
            <a href="index.html">
                <img src="images/feurlogo.png" alt="FEUR Logo" style="width: 60px; height: 60px; border-radius: 50%; background: #fff; border: 2px solid var(--secondary);">
            </a>
        </div>

        <h2>Log In</h2>
        <form id="signin-form">
            <div class="form-group">
                <label>School Email Address</label>
                <input type="email" id="email" placeholder="r2024xxxx@feuroosevelt.edu.ph" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required>
            </div>
            <div class="form-options">
                <input type="checkbox" id="show-password-signin">
                <label for="show-password-signin">Show Password</label>
            </div>
            <div class="form-options">
                <input type="checkbox" id="remember-me">
                <label for="remember-me">Remember Me</label>
            </div>
            <button type="submit" id="login-btn" class="btn btn-solid" style="width: 100%; color: white; background: var(--primary);">Log In</button>
        </form>
        <div class="switch-link">
            Don't have an account? <a href="signup.html">Sign Up</a>
        </div>
    </div>

    <div id="custom-alert" class="modal-overlay hidden">
        <div class="modal-box alert-box">
            <div class="alert-icon">❌</div>
            <h3 id="alert-title">Login Error</h3>
            <p id="alert-message"></p>
            <button id="close-alert" class="btn btn-solid" style="margin-top: 15px;">Try Again</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
