<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={theme:{extend:{colors:{'f-grn':'#3B5E3C','f-bg':'#EAE5D9'}}}}</script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js" defer></script>
</head>
<body class="bg-f-bg h-screen flex justify-center items-center p-4">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        <h2 class="text-3xl font-bold text-f-grn text-center mb-6">Sign In</h2>
        <div class="space-y-4">
            <input type="email" id="l-mail" placeholder="School Email" class="w-full p-3 border rounded outline-none focus:border-f-grn">
            <input type="password" id="l-pass" placeholder="Password" class="w-full p-3 border rounded outline-none focus:border-f-grn">
            <button id="btn-login" class="w-full bg-f-grn text-white font-bold py-3 rounded">Login</button>
            <p class="text-center text-sm">No account? <a href="signup.html" class="text-f-grn font-bold">Sign up</a></p>
        </div>
    </div>
</body>
</html>
