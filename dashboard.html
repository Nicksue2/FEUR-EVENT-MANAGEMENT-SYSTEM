<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - FEU Events</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="top-bar">
        <div class="left-head">
            <button id="burger-btn">☰</button>
            <div class="welcome-text" id="welcome-msg">Welcome, Loading...!</div>
        </div>
        
        <div class="right-head">
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search events...">
                <div id="search-results" class="dropdown-modal hidden"></div>
            </div>
            
            <select id="campus-select">
                <option value="" disabled selected>FEU Roosevelt Campuses</option>
                <option value="Cainta">Cainta</option>
                <option value="Marikina">Marikina</option>
                <option value="Rodriguez">Rodriguez</option>
            </select>

            <div class="notif-container">
                <button id="notif-btn">🔔</button>
                <div id="notif-modal" class="dropdown-modal hidden">
                    <h4>Notifications</h4>
                    <p>No new notifications.</p>
                </div>
            </div>
        </div>
    </header>

    <div class="main-layout">
        <nav id="sidebar" class="sidebar">
            <ul class="nav-links">
                <li><a href="#" class="active" data-page="home">🏠 Dashboard</a></li>
                <li><a href="#" data-page="events">📅 Events</a></li>
                <li><a href="#" data-page="orders">📄 Order List</a></li>
                <li><a href="#" data-page="settings">⚙️ Settings</a></li>
                <li><a href="#" id="logout-btn">🚪 Logout</a></li>
            </ul>
        </nav>

        <main id="content-area" class="content">
            <h2 id="page-title">Dashboard <span class="sub">Events Management</span></h2>
            
            <div id="events-grid" class="cards-container">
                </div>
        </main>
    </div>
    
    <script type="module" src="script.js"></script>
</body>
</html>
